<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Айтбеков Актан | AI CV Portfolio</title>
    <script type="module" src="https://gradio.s3-us-west-2.amazonaws.com/6.9.0/gradio.js"></script>
    <style>
        :root {
            --accent-blue: #008cff;
            --bg-black: #000000;
        }
        body { background-color: var(--bg-black); color: white; font-family: 'Arial', sans-serif; margin: 0; }
        
        header {
            height: 45vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Фото БЕЗ затемнения в центре, только градиент к низу */
            background: linear-gradient(rgba(0,0,0,0), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80');
            background-size: cover;
            background-position: center;
            border-bottom: 3px solid var(--accent-blue);
            text-align: center;
        }

        header h1 { font-size: 4rem; color: white; text-transform: uppercase; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,1); }
        header p { font-size: 1.5rem; color: var(--accent-blue); font-weight: bold; margin-top: 5px; text-shadow: 1px 1px 5px rgba(0,0,0,1); }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        h2 { text-align: center; color: var(--accent-blue); font-size: 2.2rem; text-transform: uppercase; margin-bottom: 40px; }

        .ai-container { 
            background: #0a0a0a; 
            border: 2px solid var(--accent-blue); 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 0 30px rgba(0, 140, 255, 0.2);
            margin-bottom: 60px;
        }

        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; }
        .video-card { background: #0f0f0f; border-radius: 15px; overflow: hidden; border: 1px solid #222; transition: 0.3s; }
        .video-card:hover { border-color: var(--accent-blue); transform: scale(1.02); }
        
        iframe { width: 100%; aspect-ratio: 16/9; border: none; }
        .video-info { padding: 20px; }
        .video-info h3 { color: var(--accent-blue); margin: 0 0 10px 0; font-size: 1.3rem; }
        .video-info p { color: #ccc; font-size: 1rem; margin: 0; }

        footer { text-align: center; padding: 50px; color: var(--accent-blue); border-top: 1px solid #222; }
    </style>
</head>
<body>
    <header>
        <h1>Айтбеков Актан</h1>
        <p>COMPUTER VISION & AI DEVELOPER</p>
    </header>
    <div class="container">
        <section>
            <h2>🏆 Итоговый проект: AI COACH</h2>
            <div class="ai-container">
                <gradio-app src="https://aktan27-ai-portfolio.hf.space"></gradio-app>
            </div>
        </section>
        <section>
            <h2>📺 Видео-проекты CV</h2>
            <div class="video-grid">
                <div class="video-card">
                    <iframe src="https://drive.google.com/file/d/1CVFWRGLo52l8T8-2fY57fDOxOPrn_5io/preview"></iframe>
                    <div class="video-info"><h3>🔍 Детекция градиентов</h3><p>Анализ яркости для поиска границ.</p></div>
                </div>
                </div>
        </section>
    </div>
    <footer>&copy; 2026 Айтбеков Актан. Школа №26.</footer>
</body>
</html>
