<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Айтбеков Актан | AI Portfolio</title>
    <script type="module" src="https://gradio.s3-us-west-2.amazonaws.com/6.9.0/gradio.js"></script>
    <style>
        :root {
            --accent-color: #00a2ff; /* Чистый синий */
            --bg-dark: #000000;
            --card-bg: #111111;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            margin: 0;
        }

        header {
            height: 40vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Убрали затемнение почти полностью, чтобы была ЧЕТКОСТЬ */
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80');
            background-size: cover;
            background-position: center;
            border-bottom: 4px solid var(--accent-color);
            text-align: center;
        }

        header h1 { 
            font-size: 4rem; 
            margin: 0; 
            color: #ffffff; 
            text-transform: uppercase;
            text-shadow: 3px 3px 5px rgba(0,0,0,0.8); /* Тень для четкости букв */
        }
        
        header p { 
            font-size: 1.5rem; 
            color: var(--accent-color); 
            font-weight: 900; 
            background: rgba(0,0,0,0.4); /* Подложка под текст */
            padding: 5px 15px;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        h2 { 
            text-align: center; 
            font-size: 2.5rem; 
            color: var(--accent-color); 
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .ai-container {
            background: var(--card-bg);
            border: 2px solid var(--accent-color);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 60px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .video-card {
            background: #0a0a0a;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .video-card:hover { 
            border-color: var(--accent-color);
            transform: scale(1.02);
        }

        iframe { width: 100%; aspect-ratio: 16/9; border: none; }

        .video-info { padding: 20px; }
        .video-info h3 { color: var(--accent-color); font-size: 1.4rem; margin: 0 0 10px 0; }
        .video-info p { color: #ccc; font-size: 1rem; margin: 0; }

        footer { text-align: center; padding: 40px; color: var(--accent-color); font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>Айтбеков Актан</h1>
        <p>AI & COMPUTER VISION DEVELOPER</p>
    </header>

    <div class="container">
        <section>
            <h2>🤖 МОЙ ИИ-ТРЕНЕР</h2>
            <div class="ai-container">
                <gradio-app src="https://aktan27-ai-portfolio.hf.space"></gradio-app>
            </div>
        </section>

        <section>
            <h2>🎥 ВИДЕО-ПРОЕКТЫ</h2>
            <div class="video-grid">
                <div class="video-card">
                    <iframe src="https://drive.google.com/file/d/1CVFWRGLo52l8T8-2fY57fDOxOPrn_5io/preview"></iframe>
                    <div class="video-info">
                        <h3>🔍 Градиенты</h3>
                        <p>Детекция границ объектов через анализ яркости.</p>
                    </div>
                </div>
                <div class="video-card">
                    <iframe src="https://drive.google.com/file/d/1J0UQ2vASsYeCMPloioML1WCyHuhV1h9c/preview"></iframe>
                    <div class="video-info">
                        <h3>🎭 Контуры</h3>
                        <p>Использование алгоритма Кэнни для поиска форм.</p>
